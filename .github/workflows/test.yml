name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '17 13 * * 1' # Weekly Monday — catches new CVEs against unchanged code
  workflow_dispatch: # Allow manual trigger

env:
  GO_VERSION: '1.26.x'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        go-version: ['1.26.x']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Go ${{ matrix.go-version }}
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true
        
    - name: Verify dependencies
      run: go mod verify
      
    - name: Download dependencies
      run: go mod download
      
    - name: Run vet
      run: go vet ./...
      
    - name: Run tests
      run: go test -v -race -timeout=30s ./...
      
    - name: Run tests with coverage
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true

    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run govulncheck
      run: govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        echo "Building for $GOOS/$GOARCH"
        go build -v ./...
        
  test-coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: Run tests with coverage
      run: |
        go test -coverprofile=coverage.out -covermode=atomic ./...
        go tool cover -html=coverage.out -o coverage.html
        
    - name: Calculate coverage
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
        echo "Total coverage: ${COVERAGE}%"
        echo "COVERAGE=${COVERAGE}" >> $GITHUB_ENV
        
    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: |
          coverage.out
          coverage.html
          
    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        script: |
          const coverage = process.env.COVERAGE;
          const comment = `## 📊 Test Coverage Report
          
          **Total Coverage:** ${coverage}%
          
          Coverage report generated for commit: ${context.sha.substring(0, 7)}
          
          📋 [View detailed coverage report in artifacts](${context.payload.pull_request.html_url}/checks)`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
          
  test-modules:
    name: Test Individual Modules
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        module:
          - "."
          - "./webhook"
          - "./exp/logger"
          - "./exp/config"
          - "./exp/http/handlers"
          - "./gravatar"
          - "./shell"
          - "./ssh"
          - "./term"
          - "./exp/http/tracer"
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: Test module ${{ matrix.module }}
      run: |
        echo "Testing module: ${{ matrix.module }}"
        if [ -f "${{ matrix.module }}/go.mod" ]; then
          cd "${{ matrix.module }}"
          go mod verify
          go test -v -race -timeout=30s ./...
        else
          go test -v -race -timeout=30s ${{ matrix.module }}
        fi
        
  benchmark:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ env.GO_VERSION }}
        cache: true
        
    - name: Run benchmarks
      run: |
        go test -bench=. -benchmem -count=3 ./... | tee benchmark.txt
        
    - name: Upload benchmark results
      uses: actions/upload-artifact@v7
      with:
        name: benchmark-results
        path: benchmark.txt